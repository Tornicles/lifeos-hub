components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    # ---------- Profile ----------
    Profile:
      type: object
      required: [id, fullName, remindersEnabled]
      properties:
        id: { type: string }
        fullName: { type: string }
        role: { type: ["string", "null"] }
        accountType: { type: ["string", "null"] }
        financialGoal: { type: ["string", "null"] }
        knowledgeLevel: { type: ["string", "null"] }
        dailyLearningMinutes: { type: ["integer", "null"] }
        remindersEnabled: { type: boolean }
        onboardingCompletedAt: { type: ["string", "null"], format: date-time }
        createdAt: { type: "string", format: date-time }
        updatedAt: { type: "string", format: date-time }
    ProfileUpdate:
      type: object
      properties:
        fullName: { type: string }
        role: { type: string }
        accountType: { type: string }
        financialGoal: { type: string }
        knowledgeLevel: { type: string }
        dailyLearningMinutes: { type: integer }
        remindersEnabled: { type: boolean }
        onboardingCompletedAt: { type: "string", format: date-time }

    UserRole:
      type: object
      required: [id, userId, role]
      properties:
        id: { type: string }
        userId: { type: string }
        role: { type: string, enum: [owner, member, viewer, guest, admin] }
        assignedAt: { type: string, format: date-time }
        assignedBy: { type: ["string", "null"] }
        expiresAt: { type: ["string", "null"], format: date-time }

    SecuritySettings:
      type: object
      required: [id, userId]
      properties:
        id: { type: string }
        userId: { type: string }
        mfaEnabled: { type: boolean }
        loginAttempts: { type: integer }
        lastFailedLogin: { type: ["string", "null"], format: date-time }
        accountLockedUntil: { type: ["string", "null"], format: date-time }
        passwordChangedAt: { type: ["string", "null"], format: date-time }
        sessionTimeoutMinutes: { type: integer }
    SecuritySettingsUpdate:
      type: object
      properties:
        mfaEnabled: { type: boolean }
        sessionTimeoutMinutes: { type: integer }

    # ---------- Tenants ----------
    Tenant:
      type: object
      required: [id, name, slug, plan]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        slug: { type: string }
        plan: { type: string, enum: [free, starter, pro, enterprise] }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    TenantInput:
      type: object
      required: [name, slug]
      properties:
        name: { type: string, minLength: 1 }
        slug: { type: string, minLength: 1 }
        plan: { type: string, enum: [free, starter, pro, enterprise] }
    TenantUpdate:
      type: object
      properties:
        name: { type: string }
        slug: { type: string }
        plan: { type: string, enum: [free, starter, pro, enterprise] }

    Membership:
      type: object
      required: [id, tenantId, userId, role, status]
      properties:
        id: { type: string, format: uuid }
        tenantId: { type: string, format: uuid }
        userId: { type: string }
        role: { type: string, enum: [owner, admin, member, viewer] }
        status: { type: string, enum: [pending, active, revoked] }
        invitedBy: { type: ["string", "null"] }
        invitedEmail: { type: ["string", "null"] }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    MembershipInput:
      type: object
      required: [userId]
      properties:
        userId: { type: string }
