    patch:
      operationId: updateIncome
      tags: [finance]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/IncomeUpdate" }
      responses:
        "200":
          description: Updated income entry
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Income" }
    delete:
      operationId: deleteIncome
      tags: [finance]
      responses:
        "204":
          description: Deleted

  /expenses:
