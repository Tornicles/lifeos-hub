    post:
      operationId: createHabit
      tags: [habits]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/HabitInput" }
      responses:
        "201":
          description: Created habit
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Habit" }

  /habits/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: integer }
    patch:
      operationId: updateHabit
      tags: [habits]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/HabitUpdate" }
      responses:
        "200":
          description: Updated habit
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Habit" }
    delete:
      operationId: deleteHabit
      tags: [habits]
      responses:
        "204":
          description: Deleted

  /habits/{habitId}/checkins:
    parameters:
