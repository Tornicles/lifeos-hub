      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/InvestmentEntryInput" }
      responses:
        "201":
          description: Created investment entry
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InvestmentEntry" }
  /investments/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    patch:
      operationId: updateInvestmentEntry
      tags: [finance]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/InvestmentEntryUpdate" }
      responses:
        "200":
          description: Updated investment entry
