          description: Deleted

  /net-worth-snapshots:
    get:
      operationId: listNetWorthSnapshots
      tags: [finance]
      responses:
        "200":
          description: List of net worth snapshots
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/NetWorthSnapshot" } }
