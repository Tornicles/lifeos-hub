openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: profile
  - name: tenants
  - name: hubs
  - name: logs
  - name: metrics
  - name: habits
  - name: projects
  - name: tasks
  - name: calendar
  - name: system-state
  - name: notifications
  - name: automation
  - name: insights
  - name: admin
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ---------- Profile ----------
  /profile:
    get:
      operationId: getMyProfile
      tags: [profile]
      responses:
        "200":
          description: Current user profile
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Profile" }
    patch:
      operationId: updateMyProfile
      tags: [profile]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ProfileUpdate" }
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Profile" }

  /profile/roles:
    get:
      operationId: getMyRoles
      tags: [profile]
      responses:
        "200":
          description: List of roles
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/UserRole" }

  /profile/security-settings:
    get:
      operationId: getMySecuritySettings
      tags: [profile]
      responses:
        "200":
          description: Security settings
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SecuritySettings" }
    patch:
      operationId: updateMySecuritySettings
      tags: [profile]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SecuritySettingsUpdate" }
      responses:
        "200":
          description: Updated security settings
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SecuritySettings" }

  # ---------- Tenants ----------
  /tenants:
    get:
      operationId: listTenants
      tags: [tenants]
      responses:
        "200":
          description: Tenants the current user belongs to
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Tenant" }
    post:
      operationId: createTenant
      tags: [tenants]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TenantInput" }
      responses:
        "201":
          description: Created tenant
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Tenant" }

  /tenants/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      operationId: getTenant
      tags: [tenants]
      responses:
        "200":
          description: Tenant
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Tenant" }
    patch:
      operationId: updateTenant
      tags: [tenants]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TenantUpdate" }
      responses:
        "200":
          description: Updated tenant
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Tenant" }
    delete:
      operationId: deleteTenant
      tags: [tenants]
      responses:
        "204":
          description: Deleted

  /tenants/{tenantId}/memberships:
    parameters:
      - name: tenantId
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      operationId: listMemberships
      tags: [tenants]
      responses:
        "200":
          description: Memberships for tenant
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Membership" }
    post:
      operationId: createMembership
      tags: [tenants]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/MembershipInput" }
      responses:
        "201":
          description: Created membership
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Membership" }

  /memberships/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    patch:
      operationId: updateMembership
      tags: [tenants]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/MembershipUpdate" }
      responses:
        "200":
          description: Updated membership
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Membership" }
    delete:
      operationId: deleteMembership
      tags: [tenants]
      responses:
        "204":
          description: Deleted

  # ---------- Hubs / Domains (global read-only reference data) ----------
  /hubs:
    get:
      operationId: listHubs
