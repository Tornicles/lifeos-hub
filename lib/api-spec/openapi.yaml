  # ---------- Academy ----------
  /topics:
    get:
      operationId: listTopics
      tags: [academy]
      parameters:
        - name: hubId
          in: query
          schema: { type: integer }
      responses:
        "200":
          description: List of topics
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/Topic" } }

  /topics/{topicId}/lessons:
    parameters:
      - name: topicId
        in: path
        required: true
        schema: { type: integer }
    get:
      operationId: listLessons
      tags: [academy]
      responses:
        "200":
          description: List of lessons
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/Lesson" } }

  /lessons:
    get:
      operationId: listAllLessons
      tags: [academy]
      responses:
        "200":
          description: List of all lessons, joined with topic name/code
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/LessonWithTopic" } }

  /lessons/today:
    get:
      operationId: getTodayLesson
      tags: [academy]
      responses:
        "200":
          description: >
            The lesson scheduled for today, or if none is scheduled, the next
            unread lesson in sequence. Null if every lesson has been completed.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/LessonWithTopic"
                  - type: "null"

  /lessons/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: integer }
    get:
      operationId: getLesson
      tags: [academy]
      responses:
        "200":
          description: Lesson detail with topic name/code
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LessonWithTopic" }
        "404":
          description: Lesson not found

  /lesson-progress:
    get:
      operationId: listLessonProgress
      tags: [academy]
      responses:
        "200":
          description: List of lesson progress records
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/LessonProgress" } }
    post:
      operationId: createLessonProgress
      tags: [academy]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LessonProgressInput" }
      responses:
        "201":
          description: Created/updated lesson progress
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LessonProgressResult" }

  /quizzes/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: integer }
    get:
      operationId: getQuiz
      tags: [academy]
      responses:
        "200":
          description: Quiz with questions
          content:
            application/json:
              schema: { $ref: "#/components/schemas/QuizWithQuestions" }

  /quiz-attempts:
    get:
      operationId: listQuizAttempts
      tags: [academy]
      responses:
        "200":
          description: List of quiz attempts, joined with quiz title
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/QuizAttemptWithQuiz" } }
    post:
      operationId: createQuizAttempt
      tags: [academy]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/QuizAttemptInput" }
      responses:
        "201":
          description: Created quiz attempt
          content:
            application/json:
              schema: { $ref: "#/components/schemas/QuizAttemptResult" }
        "409":
          description: This quiz has already been attempted today (one attempt per quiz per day)

  # ---------- Gamification ----------
  /challenges:
    get:
      operationId: listChallenges
      tags: [gamification]
      responses:
        "200":
          description: List of challenges
          content:
