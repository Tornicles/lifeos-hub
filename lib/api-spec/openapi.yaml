            schema: { $ref: "#/components/schemas/NetWorthSnapshotInput" }
      responses:
        "201":
          description: Created net worth snapshot
          content:
            application/json:
              schema: { $ref: "#/components/schemas/NetWorthSnapshot" }

  /net-worth-snapshots/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    patch:
      operationId: updateNetWorthSnapshot
      tags: [finance]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/NetWorthSnapshotUpdate" }
      responses:
        "200":
          description: Updated net worth snapshot
          content:
