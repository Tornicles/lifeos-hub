  /ultra-metrics:
    get:
      operationId: listUltraMetrics
      tags: [metrics]
      parameters:
        - name: tenantId
          in: query
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: List of ultra metrics
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/UltraMetric" }
    post:
      operationId: createUltraMetric
      tags: [metrics]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UltraMetricInput" }
      responses:
        "201":
          description: Created ultra metric
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UltraMetric" }

  # ---------- Habits ----------
  /habits:
    get:
      operationId: listHabits
      tags: [habits]
      parameters:
        - name: tenantId
          in: query
          schema: { type: string, format: uuid }
      responses:
