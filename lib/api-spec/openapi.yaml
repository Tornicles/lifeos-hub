      operationId: listExpenses
      tags: [finance]
      responses:
        "200":
          description: List of expenses
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/Expense" } }
    post:
      operationId: createExpense
      tags: [finance]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ExpenseInput" }
      responses:
        "201":
          description: Created expense
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Expense" }
  /expenses/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    patch:
      operationId: updateExpense
      tags: [finance]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ExpenseUpdate" }
      responses:
        "200":
          description: Updated expense
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Expense" }
    delete:
      operationId: deleteExpense
      tags: [finance]
      responses:
        "204":
          description: Deleted

  /savings-goals:
    get:
      operationId: listSavingsGoals
      tags: [finance]
      responses:
        "200":
          description: List of savings goals
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/SavingsGoal" } }
    post:
      operationId: createSavingsGoal
      tags: [finance]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SavingsGoalInput" }
      responses:
        "201":
          description: Created savings goal
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SavingsGoal" }
  /savings-goals/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    patch:
      operationId: updateSavingsGoal
      tags: [finance]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SavingsGoalUpdate" }
      responses:
        "200":
          description: Updated savings goal
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SavingsGoal" }
    delete:
      operationId: deleteSavingsGoal
      tags: [finance]
      responses:
        "204":
          description: Deleted

  /debts:
    get:
      operationId: listDebts
      tags: [finance]
      responses:
        "200":
          description: List of debts
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/Debt" } }
    post:
      operationId: createDebt
      tags: [finance]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DebtInput" }
      responses:
        "201":
          description: Created debt
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Debt" }
  /debts/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    patch:
      operationId: updateDebt
      tags: [finance]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DebtUpdate" }
      responses:
        "200":
