              schema:
                type: array
                items: { $ref: "#/components/schemas/Log" }
    post:
      operationId: createLog
      tags: [logs]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LogInput" }
      responses:
        "201":
          description: Created log
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Log" }

  /logs/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: integer }
    patch:
      operationId: updateLog
      tags: [logs]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LogUpdate" }
      responses:
        "200":
          description: Updated log
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Log" }
    delete:
      operationId: deleteLog
      tags: [logs]
      responses:
        "204":
          description: Deleted

  # ---------- Metrics ----------
  /metrics:
