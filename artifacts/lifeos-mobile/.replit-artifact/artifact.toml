kind = "mobile"
previewPath = "/lifeos-mobile/"
title = "LifeOS Mobile"
version = "1.0.0"
id = "artifacts/lifeos-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/lifeos-mobile/" ]
localPort = 25780

[services.development]
run = "pnpm --filter @workspace/lifeos-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lifeos-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/lifeos-mobile", "run", "serve" ]

[services.env]
PORT = "25780"
BASE_PATH = "/lifeos-mobile/"
