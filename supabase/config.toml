# LifeOS Hub — local / CI Supabase config
# Intentionally does NOT embed staging or production project credentials.
# CI uses `supabase start` (ephemeral Docker on the runner).

project_id = "lifeos-hub-local"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[db.pooler]
enabled = false

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["http://127.0.0.1:3000"]
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = false
